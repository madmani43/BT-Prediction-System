<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor MRI Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
    font-family: 'Arial', sans-serif;
    background-color: #f8f9fa;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
    }
    .card {
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .btn{
        width: 100%;
    }
    .lead {
        margin-bottom: 30px;
    }
</style>
<body>
    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4 text-primary">Brain Tumor MRI Detection System</h1>
            <p class="lead text-secondary">Upload an MRI scan to detect if there is a brain tumor present.</p>
        </div>
        <div class="card shadow p-4 mt-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="file" class="form-label">Select MRI Image:</label>
                    <input type="file" class="form-control" name="file" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary">Detect Tumor</button>
            </form>
        </div>
        
        {% if result %}
        <div class="card shadow p-4 mt-4" style="border-left: 5px solid #0d6efd;">
            <h3 class="text-center text-success">Detection Result</h3>
            <hr>
            <p class="text-center"><strong>Result:</strong> <span style="font-size: 1.2em; color: #0d6efd;">{{ result }}</span></p>
            <p class="text-center"><strong>Confidence:</strong> <span style="font-size: 1.2em; color: #0d6efd;">{{ confidence }}%</span></p>
            {% if file_path %}
            <div class="text-center mt-4">
                <p><strong>Uploaded Image:</strong></p>
                <img src="{{ file_path }}" alt="Uploaded MRI Image" class="img-fluid rounded" style="max-width: 400px; border: 2px solid #0d6efd;">
            </div>
            {% endif %}
        </div>
        {% endif %}
        
        
        
</body>
